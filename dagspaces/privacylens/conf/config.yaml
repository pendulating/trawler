# Top-level Hydra config for PrivacyLens evaluation dagspace

defaults:
  - _self_
  - pipeline: privacylens_clean
  - data: privacylens

experiment:
  name: privacylens_eval

runtime:
  output_root: null
  debug: false
  sample_n: null
  job_memory_gb: 64

# External judge server for leakage + helpfulness evaluation.
# Default: local vLLM server launched with `sbatch scripts/judge_server.sub`
# then `export JUDGE_SERVER_URL=http://klara:8002`.
# For commercial APIs, override judge.* at the CLI or in a local config:
#   judge.base_url=https://api.openai.com/v1 judge.model_name=gpt-4o judge.api_key_env=OPENAI_API_KEY
judge_server_url: ${oc.env:JUDGE_SERVER_URL,""}   # legacy alias; prefer judge.base_url below

judge:
  base_url: ${judge_server_url}    # overridable independently
  model_name: default              # vLLM: auto-detects; commercial: set explicitly
  provider: null                   # null = auto-detect | vllm | openai | anthropic | gemini | openai_compatible
  api_key: null                    # or use api_key_env
  api_key_env: null                # e.g. OPENAI_API_KEY
  max_workers: 8
  temperature: 0.0
  max_tokens: 1024

sampling_params:
  seed: 777
  temperature: 0.2
  top_p: 1.0
  top_k: -1
  max_tokens: 2048

wandb:
  enabled: true
  project: privacylens-eval
  entity: ""
  group: ""
  table_sample_rows: 1000
  single_run: true

hydra:
  searchpath:
    - pkg://dagspaces.common.conf
  job:
    name: ${experiment.name}
  run:
    dir: ${oc.env:HYDRA_RUN_DIR,outputs}/${now:%Y-%m-%d}_${experiment.name}/${now:%H-%M-%S}
  sweep:
    dir: ${oc.env:HYDRA_SWEEP_DIR,multirun}/${now:%Y-%m-%d}_${experiment.name}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

