# @package _global_
# Full event detection + synthesis pipeline: classify -> events -> synthesis
#
# Workflow:
#   1. Load existing classify output (filtered relevant articles)
#   2. Detect narrative events using HDBSCAN
#   3. Synthesize insights for each event cluster
#
# Usage:
#   python -m dagspaces.uair.run_pipeline \
#     pipeline=event_synthesis_from_classify \
#     ARTICLES_PATH=/path/to/classify_relevant.parquet

defaults:
  - override /hydra/launcher: slurm_monitor

runtime:
  debug: false
  sample_n: null

pipeline:
  output_root: ${runtime.output_root}
  allow_partial: false
  
  sources:
    articles:
      path: ${oc.env:ARTICLES_PATH,/share/pierson/matt/UAIR/outputs/classify/classify_relevant.parquet}
      type: parquet
  
  graph:
    nodes:
      # Stage 1: Event detection
      topic:
        stage: topic
        depends_on: []
        inputs:
          dataset: articles
        outputs:
          docs: outputs/topic/event_clusters.parquet
        overrides:
          runtime.streaming_io: ${runtime.streaming_io}
          runtime.debug: ${runtime.debug}
          runtime.job_memory_gb: 64
          
          # Event detection parameters (from event_detection.yaml)
          topic.hdbscan.min_cluster_size: 2
          topic.hdbscan.min_samples: 1
          topic.hdbscan.cluster_selection_epsilon: 0.03
          topic.hdbscan.cluster_selection_method: eom
          topic.reduce.n_neighbors: 15
          topic.reduce.min_dist: 0.0
          topic.reduce.n_components: 25
          topic.embed.matryoshka_dim: 384
          topic.embed.device: cuda
          topic.embed.batch_size: 128
          topic.gpu.use_rapids: true
          topic.tfidf_stop_words: dagspaces/uair/conf/stopwords/comprehensive.yaml
        launcher: slurm_gpu_2x
        wandb_suffix: events
      
      # Stage 2: Synthesis per event
      synthesis:
        stage: synthesis
        depends_on:
          - topic
        inputs:
          clusters: topic.docs     # Event assignments from topic stage
          articles: articles       # Original articles with full text
        outputs:
          clusters: outputs/synthesis/event_synthesis.parquet
        overrides:
          runtime.streaming_io: ${runtime.streaming_io}
          runtime.debug: ${runtime.debug}
          runtime.job_memory_gb: 48
          
          # vLLM settings for synthesis
          model.engine_kwargs.max_model_len: 8192
          model.engine_kwargs.max_num_seqs: 4
          model.engine_kwargs.gpu_memory_utilization: 0.8
          model.batch_size: 4
          
          # Synthesis strategy
          synthesis.strategy: hierarchical_map_reduce
          synthesis.max_articles_per_cluster: 64  # Limit for large events
          synthesis.min_cluster_size: 5            # Only synthesize events with 5+ articles
          synthesis.min_topic_prob: 0.3            # Confidence threshold
          
          # Output tokens for synthesis
          sampling_params_synthesis.max_tokens: 2048
        launcher: slurm_gpu_2x
        wandb_suffix: synthesis

# Expected workflow results:
# ----------------------------
# Stage 1 (Event Detection):
#   Input:  100k-1M relevant articles
#   Output: 10k-50k event clusters + metadata
#   Time:   ~30-60 min on 2xA6000
#
# Stage 2 (Event Synthesis):
#   Input:  Event clusters (filtered: size >= 5)
#   Output: ~2k-10k event summaries (major events only)
#   Time:   ~1-3 hours on 2xA6000 (depends on cluster count)
#
# Output columns (event_synthesis.parquet):
#   - topic_id: Event cluster ID
#   - cluster_size: Number of articles in event
#   - synthesis_text: LLM-generated event summary
#   - topic_top_terms: TF-IDF keywords for event
#   - article_ids: List of article IDs in event
#   - countries: Countries mentioned in event
#   - years: Temporal span of event
