# Uses Hydra Submitit Slurm launcher
_target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.SlurmLauncher
submitit_folder: ${hydra.sweep.dir}/.submitit/%j
timeout_min: 480
nodes: 1
tasks_per_node: 1
cpus_per_task: 8
mem_gb: 64
gpus_per_node: 4
partition: ju
array_parallelism: 1
name: E_rule_tuples
additional_parameters:
  gres: gpu:4
  wckey: ""
setup:
  - export HYDRA_FULL_ERROR=1
  - source ~/.bashrc
  - source activate /share/pierson/matt/conda/cillm-lora
  # Explicitly set CUDA_VISIBLE_DEVICES to local indices (0,1,...,N-1)
  # This is REQUIRED for vLLM V1 multiprocessing - unset causes race conditions
  # where spawned workers see different GPU counts than the parent process
  - if [ -n "$SLURM_GPUS_ON_NODE" ] && [ "$SLURM_GPUS_ON_NODE" -gt 0 ]; then export CUDA_VISIBLE_DEVICES=$(seq -s, 0 $((SLURM_GPUS_ON_NODE - 1))); else unset CUDA_VISIBLE_DEVICES; fi
  - export RULE_TUPLES_SILENT=1
  - export WANDB_SILENT=true
  - export VLLM_WORKER_MULTIPROC_METHOD=spawn
  # NCCL configuration for PCIe-only machines (no NVLink)
  - export NCCL_DEBUG=WARN
  - export NCCL_P2P_DISABLE=1
  - export NCCL_IB_DISABLE=1
  - export NCCL_CUMEM_HOST_ENABLE=0
  - export NCCL_SHM_DISABLE=1

