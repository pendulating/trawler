# @package _global_
# Contextual Integrity Information Flow Extraction Pipeline -- Fiction Texts
#
# Extracts Nissenbaum CI information flow tuples from a sample of fiction:
#   Pride and Prejudice, Alice in Wonderland, Frankenstein,
#   The Age of Innocence, 1984
#
# Pipeline: Fetch (Gutenberg IDs + text URLs) -> CI Reasoning -> CI Extraction
#
# Uses tensor parallelism across 2 GPUs.
#
# Usage:
#   python -m dagspaces.historical_norms.cli -m \
#     pipeline=ci_extraction_fiction

defaults:
  - override /hydra/launcher: slurm_monitor

# Override prompts to use fiction variants
prompt_ci_reasoning: ${prompt_ci_reasoning_fiction}
prompt_ci_extraction: ${prompt_ci_extraction_fiction}

runtime:
  debug: false
  sample_n: null

pipeline:
  output_root: ${hydra:run.dir}/ci_extraction_fiction
  allow_partial: false

  sources:
    gutenberg_config:
      path: ${oc.env:GUTENBERG_CONFIG,dagspaces/historical_norms/conf/data/fiction_sample_for_colm.yaml}
      type: yaml

  graph:
    nodes:
      # ============================================================
      # Stage 1: Fetch and Chunk
      # Fetches texts by Gutenberg ID and by direct URL, then chunks.
      # Supports both gutenberg_ids and text_urls in the data config.
      # ============================================================
      fetch:
        stage: fetch_gutenberg
        depends_on: []
        inputs:
          config: gutenberg_config
        outputs:
          dataset: outputs/fetch/chunks.parquet
        overrides:
          runtime.debug: ${runtime.debug}
        launcher: g2_slurm_cpu
        wandb_suffix: fetch

      # ============================================================
      # Stage 2: CI Reasoning
      # Identifies information flows in fiction and reasons about
      # context, actors, direction, and appropriateness.
      # ============================================================
      ci_reasoning:
        stage: ci_reasoning
        depends_on: [fetch]
        inputs:
          dataset: fetch.dataset
        outputs:
          dataset: outputs/ci_reasoning/reasoning.parquet
        overrides:
          runtime.debug: ${runtime.debug}
          runtime.sample_n: ${runtime.sample_n}
          runtime.job_memory_gb: 256
          sampling_params.max_tokens: 4096
        launcher: g2_slurm_pierson
        wandb_suffix: ci_reasoning

      # ============================================================
      # Stage 3: CI Extraction
      # Converts reasoning traces to structured 5-component
      # CI information flow tuples.
      # ============================================================
      ci_extraction:
        stage: ci_extraction
        depends_on: [ci_reasoning]
        inputs:
          dataset: ci_reasoning.dataset
        outputs:
          dataset: outputs/ci_extraction/ci_flows.parquet
        overrides:
          runtime.debug: ${runtime.debug}
          runtime.sample_n: ${runtime.sample_n}
          runtime.job_memory_gb: 256
          sampling_params.max_tokens: 2048
        launcher: g2_slurm_pierson
        wandb_suffix: ci_extraction
