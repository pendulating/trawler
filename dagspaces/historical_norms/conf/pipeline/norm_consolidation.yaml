# @package _global_
# Standalone Norm Consolidation Pipeline
#
# Runs consolidation independently on the output of a prior norm
# extraction run. Groups norms by gutenberg_id so that clustering
# only happens within each book/text universe.
#
# Usage:
#   python -m dagspaces.historical_norms.cli \
#     pipeline=norm_consolidation \
#     data.parquet_path=/path/to/structured_norms.parquet
#
#   # Or point at a specific extraction output directory:
#   python -m dagspaces.historical_norms.cli \
#     pipeline=norm_consolidation \
#     extraction_input=/abs/path/to/extraction/structured_norms.parquet
#
#   # Override clustering params:
#   python -m dagspaces.historical_norms.cli \
#     pipeline=norm_consolidation \
#     data.parquet_path=/path/to/norms.parquet \
#     consolidation.min_cluster_size=5 \
#     consolidation.group_by=gutenberg_id

defaults:
  - override /hydra/launcher: slurm_monitor

# Prompt for the LLM merge step
prompt_consolidation: ${prompt_consolidation}

# Path to the extraction parquet to consolidate.
# Override via CLI: data.parquet_path=/path/to/structured_norms.parquet
# or:              extraction_input=/path/to/structured_norms.parquet
extraction_input: ${oc.env:EXTRACTION_PARQUET,${data.parquet_path}}

runtime:
  debug: false
  sample_n: null

# Consolidation-specific configuration
consolidation:
  embedding_model: all-MiniLM-L6-v2
  min_cluster_size: 3
  min_samples: 2
  cluster_selection_epsilon: 0.0
  group_by: gutenberg_id

pipeline:
  output_root: ${hydra:run.dir}/norm_consolidation
  allow_partial: false

  sources:
    extraction_output:
      path: ${extraction_input}
      type: parquet

  graph:
    nodes:
      # ============================================================
      # Stage 1 (only): Norm Consolidation
      # Embeds norms with sentence-transformers, groups by
      # gutenberg_id, partitions by normative_force, clusters
      # with HDBSCAN, then LLM-merges each cluster into a
      # canonical norm with provenance tracking.
      # ============================================================
      consolidation:
        stage: norm_consolidation
        depends_on: []
        inputs:
          dataset: extraction_output
        outputs:
          dataset: outputs/consolidation/consolidated_norms.parquet
        overrides:
          runtime.debug: ${runtime.debug}
          runtime.sample_n: ${runtime.sample_n}
          runtime.job_memory_gb: 256
          sampling_params.max_tokens: 2048
          consolidation: ${consolidation}
        launcher: g2_slurm_pierson
        wandb_suffix: consolidation
