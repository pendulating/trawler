model_source: /share/pierson/matt/zoo/models/Qwen2.5-72B-Instruct-AWQ
model_family: qwen2.5
engine_kwargs:
  enable_chunked_prefill: true
  max_num_batched_tokens: 32768
  max_model_len: 32768
  gpu_memory_utilization: 0.92
  # TP=2: AWQ 72B needs 2 GPUs per tensor-parallel group (~18GB each).
  tensor_parallel_size: 2
  # DP=2: run 2 independent TP=2 replicas, each processing half the data.
  # Total: 2 DP × 2 TP = 4 GPUs. ~2x throughput vs single TP=2.
  data_parallel_size: 2
  enable_prefix_caching: true
  disable_log_stats: true
  quantization: awq
  kv_cache_dtype: fp8
  # Each TP=2 replica has ~2×A6000 @ 0.92 ≈ 88GB usable. Same as 2-GPU config.
  max_num_seqs: 32
batch_size: 0
concurrency: 1
