# @package _global_
# Full end-to-end event detection pipeline: articles -> classify -> events -> synthesis
# Uses general AI prompts (non-urban-specific) from conf/prompt/general_ai/
#
# Workflow:
#   1. Load raw articles from parquet
#   2. Classify articles as relevant/not relevant to AI risks
#   3. Detect narrative events using HDBSCAN clustering
#   4. Synthesize insights for each event cluster using LLM
#
# Usage:
#   python -m dagspaces.uair.cli -m \
#     pipeline=full_event_pipeline_general_ai_us \
#     data.parquet_path=/path/to/all_articles.parquet
#
# Environment variables (optional):
#   - ARTICLES_PATH: Override input articles path

defaults:
  - override /hydra/launcher: slurm_monitor

runtime:
  debug: false
  sample_n: null  # Set to small number for testing (e.g. 1000)

pipeline:
  output_root: ${hydra:run.dir}/full_event_pipeline_general_ai
  allow_partial: false
  
  sources:
    articles:
      path: /share/pierson/matt/UAIR/data/global_subset/all_articles.parquet
      type: parquet
  
  graph:
    nodes:
      # ============================================================
      # Stage 1: Classification - Filter relevant articles
      # ============================================================
      classify:
        stage: classify_relevance
        depends_on: []
        inputs:
          dataset: articles
        outputs:
          all: outputs/classify/classify_all.parquet
          relevant: outputs/classify/classify_relevant.parquet
        overrides:
          runtime.rows_per_block: ${runtime.rows_per_block}
          runtime.streaming_io: false
          runtime.sample_n: ${runtime.sample_n}
          runtime.debug: ${runtime.debug}
          runtime.use_llm_classify: true
          runtime.job_memory_gb: 64 
          runtime.prompt_subdirectory: general_ai
          
          # Model config for 2xGPU setup
          model.engine_kwargs.gpu_memory_utilization: 0.8
          model.engine_kwargs.max_model_len: 8192
          model.engine_kwargs.max_num_seqs: 8
          model.engine_kwargs.enable_prefix_caching: false
          model.batch_size: 16
        launcher: slurm_gpu_2x
        wandb_suffix: classify

      # ============================================================
      # Stage 2: Decompose to NBL tuples
      # ============================================================
      decompose_nbl:
        stage: decompose_nbl
        depends_on:
          - classify
        inputs:
          dataset: classify.relevant
        outputs:
          docs: outputs/decompose_nbl/tuples.parquet
        overrides:
          runtime.streaming_io: false
          runtime.debug: ${runtime.debug}
          runtime.job_memory_gb: 64
          runtime.use_llm_decompose: true
          runtime.guided_decoding_decompose: true
          runtime.prompt_subdirectory: general_ai
          model.engine_kwargs.gpu_memory_utilization: 0.9
          model.engine_kwargs.max_model_len: 20480
          model.engine_kwargs.max_num_seqs: 4
          model.batch_size: 4
          sampling_params_decompose_nbl.max_tokens: 2048
        launcher: slurm_gpu_2x
        wandb_suffix: decompose_nbl

      # ============================================================
      # Stage 3: Verify NBL tuples
      # ============================================================
      verify_nbl:
        stage: verify_nbl
        depends_on:
          - decompose_nbl
        inputs:
          dataset: decompose_nbl.docs
        outputs:
          results: outputs/verify_nbl/verify_nbl_results.parquet
          docs: outputs/verify_nbl/docs_verification.parquet
        overrides:
          runtime.streaming_io: ${runtime.streaming_io}
          runtime.debug: ${runtime.debug}
          runtime.job_memory_gb: 64
          verify.method: combo
          verify.top_k: 8
          verify.thresholds: "sim=0.4,ent=0.75,contra=0.1"
          verify.embed_model_name: /share/pierson/matt/zoo/models/intfloat_e5_base
          verify.nli_model_name: /share/pierson/matt/zoo/models/mdeberta_v3_base_xnli_multilingual_nli_2mil7
          verify.windowing.enabled: true
          verify.windowing.window_size: 5
          verify.windowing.stride: 2
        launcher: slurm_gpu_2x
        wandb_suffix: verify_nbl

      # ============================================================
      # Stage 4: EU AI Act classification (gated by core_tuple_verified)
      # ============================================================
      classify_eu_act:
        stage: classify_eu_act
        depends_on:
          - verify_nbl
        inputs:
          dataset: verify_nbl.results
        outputs:
          results: outputs/classify_eu_ai_act/classify_eu_ai_act_results.parquet
        overrides:
          runtime.streaming_io: false
          runtime.debug: ${runtime.debug}
          runtime.job_memory_gb: 64
          runtime.prefilter_mode: off
          runtime.keyword_buffering: false
          runtime.prompt_subdirectory: general_ai
          model.engine_kwargs.max_model_len: 16384
          model.engine_kwargs.max_num_seqs: 4
          model.engine_kwargs.gpu_memory_utilization: 0.8
          model.batch_size: 4
          sampling_params_eu_ai_act.max_tokens: 4096
          sampling_params_eu_ai_act.temperature: 0
        launcher: slurm_gpu_2x
        wandb_suffix: eu_act

      # ============================================================
      # Stage 5: Risks and Benefits classification
      # ============================================================
      classify_risk_and_benefits:
        stage: classify_risk_and_benefits
        depends_on:
          - verify_nbl
        inputs:
          dataset: verify_nbl.results
        outputs:
          results: outputs/classify_risk_benefits/classify_risk_benefits_results.parquet
        overrides:
          runtime.streaming_io: false
          runtime.debug: ${runtime.debug}
          runtime.job_memory_gb: 256
          runtime.serialize_nested_json: true
          runtime.prefilter_mode: off
          runtime.keyword_buffering: false
          runtime.skip_merge_filtered: false
          runtime.prompt_subdirectory: general_ai
          model.engine_kwargs.max_model_len: 32768
          model.engine_kwargs.max_num_seqs: 4
          model.engine_kwargs.gpu_memory_utilization: 0.8
          model.batch_size: 4
          sampling_params_risks_and_benefits.max_tokens: 8192
          sampling_params_risks_and_benefits.temperature: 0
          runtime.sample_rb_v1: true
        launcher: slurm_gpu_2x
        wandb_suffix: risk_benefits

# ================================================================
# Expected workflow results:
# ================================================================
#
# Stage 1 (Classification):
#   Input:  Raw articles (all_articles.parquet)
#   Output: ~10-30% filtered as relevant
#   Time:   ~10-30 min per 100k articles on 2xA6000
#
# Stage 2 (Event Detection):
#   Input:  Relevant articles only (10k-300k)
#   Output: 1k-10k event clusters + metadata
#   Time:   ~30-90 min on 2xA6000
#
# Stage 3 (Event Synthesis):
#   Input:  Event clusters (filtered: size >= 3)
#   Output: 500-5k event summaries
#   Time:   ~1-3 hours on 2xA6000 (depends on cluster count)
#
# ================================================================
# Output Files:
# ================================================================
#
# outputs/classify/classify_all.parquet:
#   - All articles with relevance scores
#   - Columns: article_id, article_text, is_relevant, relevance_score
#
# outputs/classify/classify_relevant.parquet:
#   - Only relevant articles (is_relevant=True)
#   - Used as input to event detection
#
# outputs/topic/event_clusters.parquet:
#   - Articles with event cluster assignments
#   - Columns: article_id, topic_id, topic_prob, topic_top_terms,
#              article_keywords, plot_x, plot_y, country, year
#
# outputs/synthesis/event_synthesis.parquet:
#   - Event summaries with structured insights
#   - Columns: topic_id (event ID), cluster_size, synthesis_text,
#              topic_top_terms, article_ids, countries, date_range
#
# ================================================================
# Configuration Notes:
# ================================================================
#
# For testing on a small sample:
#   python -m dagspaces.uair.cli -m \
#     pipeline=full_event_pipeline_general_ai_us \
#     runtime.sample_n=1000 \
#     runtime.debug=true
#
# For full production run:
#   python -m dagspaces.uair.cli -m \
#     pipeline=full_event_pipeline_general_ai_us \
#     data.parquet_path=/path/to/all_articles.parquet
#
# To adjust event granularity:
#   - Smaller events: Decrease cluster_selection_epsilon (e.g. 0.01)
#   - Larger events:  Increase cluster_selection_epsilon (e.g. 0.1)
#   - More events:    Decrease min_cluster_size (e.g. 1)
#   - Fewer events:   Increase min_cluster_size (e.g. 5)
#
# Note: This pipeline uses prompts from conf/prompt/general_ai/ which are
# designed for general AI use cases (not urban-specific). The prompts have
# been refactored to remove urban AI references and focus on general AI
# applications across all domains.


