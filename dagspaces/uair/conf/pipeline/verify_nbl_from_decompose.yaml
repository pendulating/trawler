# @package _global_
# Run verify_nbl on the outputs of decompose_nbl

defaults:
  - override /hydra/launcher: slurm_monitor

runtime:
  debug: false
  sample_n: null
  streaming_io: false
  # Optional windowing for sentence windows
  # verify.windowing.enabled: true
  # verify.windowing.window_size: 5
  # verify.windowing.stride: 2

pipeline:
  output_root: ${runtime.output_root}
  allow_partial: false
  sources:
    articles:
      # Use decompose output as input; override with ARTICLES_PATH if desired
      path: ${oc.env:DECOMPOSE_RESULTS_PATH,}
      type: parquet
  graph:
    nodes:
      verify_nbl:
        stage: verify_nbl
        depends_on: []
        inputs:
          dataset: articles
        outputs:
          results: outputs/verify_nbl/verify_nbl_results.parquet
        overrides:
          runtime.streaming_io: ${runtime.streaming_io}
          runtime.debug: ${runtime.debug}
          # Tuple verification thresholds
          verify.method: combo
          verify.top_k: 5
          verify.thresholds: sim=0.70,ent=0.85,contra=0.10
          # Local model paths
          verify.embed_model_name: /share/pierson/matt/zoo/models/intfloat_e5_base
          verify.nli_model_name: /share/pierson/matt/zoo/models/mdeberta_v3_base_xnli_multilingual_nli_2mil7
          # Optional windowing (uncomment as needed)
          verify.windowing.enabled: true
          verify.windowing.window_size: 3
          verify.windowing.stride: 1
        launcher: g2_slurm_gpu_1x
        wandb_suffix: verify_nbl


