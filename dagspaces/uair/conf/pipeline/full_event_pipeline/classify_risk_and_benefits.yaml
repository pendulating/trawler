# @package _global_
# Standalone execution for the "classify_risk_and_benefits" stage from full_event_pipeline.

defaults:
  - override /hydra/launcher: slurm_monitor

runtime:
  debug: false
  sample_n: null

pipeline:
  output_root: ${hydra:run.dir}/full_event_pipeline/classify_risk_and_benefits
  allow_partial: true

  sources:
    verify_results:
      # Override RISK_BENEFITS_INPUT_PATH or data.parquet_path with verify_nbl output.
      path: ${oc.env:RISK_BENEFITS_INPUT_PATH,${data.parquet_path}}
      type: parquet

  graph:
    nodes:
      classify_risk_and_benefits:
        stage: classify_risk_and_benefits
        depends_on: []
        inputs:
          dataset: verify_results
        outputs:
          results: outputs/classify_risk_benefits/classify_risk_benefits_results.parquet
        overrides:
          runtime.streaming_io: false
          runtime.debug: ${runtime.debug}
          runtime.job_memory_gb: 64
          runtime.serialize_nested_json: true
          runtime.use_llm_classify: true
          runtime.classification_profile: risks_and_benefits
          runtime.prefilter_mode: off
          runtime.keyword_buffering: false
          runtime.skip_merge_filtered: false
          model.engine_kwargs.max_model_len: 16384
          model.engine_kwargs.max_num_seqs: 4
          model.engine_kwargs.gpu_memory_utilization: 0.8
          model.batch_size: 4
          sampling_params_risks_and_benefits.max_tokens: 4096
          sampling_params_risks_and_benefits.temperature: 0
          runtime.sample_rb_v1: true
        launcher: g2_slurm_pierson
        wandb_suffix: risk_benefits

