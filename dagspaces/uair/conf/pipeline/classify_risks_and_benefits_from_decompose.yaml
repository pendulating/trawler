# @package _global_
# Run only the classify stage (Risks and Benefits profile) using precomputed decompose output

defaults:
  - override /hydra/launcher: slurm_monitor
  - override /prompt: classify_risks_and_benefits

runtime:
  debug: false
  sample_n: null

pipeline:
  output_root: ${runtime.output_root}
  allow_partial: false
  sources:
    articles:
      # Use decompose output as input; override with ARTICLES_PATH if desired
      path: ${oc.env:ARTICLES_PATH,/share/pierson/matt/UAIR/outputs/decompose/oct15_all_decompose_results.parquet}
      type: parquet
  graph:
    nodes:
      classify_risks_and_benefits:
        stage: classify
        depends_on: []
        inputs:
          dataset: articles
        outputs:
          results: outputs/classify_risks_and_benefits/classify_risks_and_benefits_results.parquet
        overrides:
          runtime.streaming_io: false
          runtime.debug: ${runtime.debug}
          runtime.job_memory_gb: 64
          runtime.use_llm_classify: true
          runtime.classification_profile: risks_and_benefits
          # Decompose outputs may not contain article_text; disable keyword gating/buffering
          runtime.prefilter_mode: off
          runtime.keyword_buffering: false
          # Risks and benefits needs larger context for full UDHR + SDGs + PESTLE content
          model.engine_kwargs.max_model_len: 32768
          model.engine_kwargs.max_num_seqs: 4
          model.engine_kwargs.gpu_memory_utilization: 0.8
          model.batch_size: 4
          # Risks and benefits produces complex nested JSON, needs more output tokens
          sampling_params_risks_and_benefits.max_tokens: 8192
          sampling_params_risks_and_benefits.temperature: 0


        launcher: g2_slurm_pierson
        wandb_suffix: classify_risks_and_benefits



