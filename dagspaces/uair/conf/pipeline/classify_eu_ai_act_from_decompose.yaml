# @package _global_
# Run only the classify stage (EU AI Act profile) using precomputed decompose output

defaults:
  - override /hydra/launcher: slurm_monitor
  - override /prompt: eu_ai_act_classification

runtime:
  debug: false
  sample_n: null

pipeline:
  output_root: ${runtime.output_root}
  allow_partial: false
  sources:
    articles:
      # Use decompose output as input; override with ARTICLES_PATH if desired
      path: ${oc.env:ARTICLES_PATH,/share/pierson/matt/UAIR/outputs/decompose/oct15_all_decompose_results.parquet}
      type: parquet
  graph:
    nodes:
      classify_eu_ai_act:
        stage: classify
        depends_on: []
        inputs:
          dataset: articles
        outputs:
          results: outputs/classify_eu_ai_act/classify_eu_ai_act_results.parquet
        overrides:
          runtime.streaming_io: false
          runtime.debug: ${runtime.debug}
          runtime.job_memory_gb: 64
          runtime.use_llm_classify: true
          runtime.classification_profile: eu_ai_act
          # Decompose outputs may not contain article_text; disable keyword gating/buffering
          runtime.prefilter_mode: off
          runtime.keyword_buffering: false
          model.engine_kwargs.max_model_len: 16384
          model.engine_kwargs.max_num_seqs: 4
          model.engine_kwargs.gpu_memory_utilization: 0.8
          model.batch_size: 4
          sampling_params_eu_ai_act.max_tokens: 4096


        launcher: g2_slurm_pierson
        wandb_suffix: classify_eu_ai_act


