# @package _global_
# Minimal pipeline to run synthesis from a precomputed topic output (no articles join)

defaults:
  - override /hydra/launcher: slurm_monitor

runtime:
  debug: false
  sample_n: null

# Synthesis config (inherits from main config via defaults); override schema/sampling if desired
synthesis:
  strategy: hierarchical_map_reduce
  schema_path: ${oc.env:SYNTHESIS_SCHEMA,dagspaces/uair/conf/synthesis/schema.json}

sampling_params_synthesis:
  seed: 777
  temperature: 0.1
  top_p: 0.95
  max_tokens: 2048

pipeline:
  output_root: ${runtime.output_root}
  allow_partial: false
  sources:
    clusters:
      path: ${oc.env:CLUSTERS_PATH,/share/pierson/matt/UAIR/outputs/topic/docs_topics.parquet}
      type: parquet
  graph:
    nodes:
      synthesis:
        stage: synthesis
        depends_on: []
        inputs:
          clusters: clusters
        outputs:
          clusters: outputs/synthesis/cluster_synthesis.parquet
        overrides:
          runtime.streaming_io: ${runtime.streaming_io}
          runtime.debug: ${runtime.debug}
          runtime.job_memory_gb: 32
          model.engine_kwargs.max_model_len: 8192
          model.engine_kwargs.max_num_seqs: 2
          model.engine_kwargs.gpu_memory_utilization: 0.8
          model.batch_size: 1
          sampling_params_synthesis.max_tokens: 2048
        launcher: slurm_gpu_2x
        wandb_suffix: synthesis



