defaults:
  - _self_
  - pipeline: cirl_vignettes_eval
  - prompt: direct
  - data: cirl_vignettes

experiment:
  name: cirl_vignettes

runtime:
  output_root: null
  debug: false
  sample_n: null
  job_memory_gb: 64

sampling_params:
  seed: 42
  temperature: 0.0
  max_tokens: 16
  # Trajectory inference overrides (used by trajectory_inference stage)
  trajectory_temperature: 0.7
  trajectory_max_tokens: 7000

judge:
  # Default: vLLM server (auto-detected from hostname). For commercial APIs, e.g.:
  #   base_url: https://api.openai.com/v1
  #   model_name: gpt-4o
  #   api_key_env: OPENAI_API_KEY
  # Other providers:
  #   Anthropic: base_url=https://api.anthropic.com/v1/ + api_key_env=ANTHROPIC_API_KEY
  #   Gemini:    base_url=https://generativelanguage.googleapis.com/v1beta/openai/ + api_key_env=GOOGLE_API_KEY
  base_url: ${oc.env:JUDGE_SERVER_URL,http://localhost:8002}
  model_name: default            # vLLM: auto-detects via /v1/models; commercial: set explicitly
  provider: null                 # null = auto-detect from base_url; else vllm|openai|anthropic|gemini|openai_compatible
  api_key: null                  # or set api_key_env below
  api_key_env: null              # env var name to read key from
  max_workers: 8
  temperature: 0.0
  max_tokens: 400

wandb:
  enabled: true
  project: cirl-vignettes
  entity: ""
  group: ""
  table_sample_rows: 1000
  single_run: true

hydra:
  searchpath:
    - pkg://dagspaces.common.conf
  job:
    name: ${experiment.name}
  run:
    dir: ${oc.env:HYDRA_RUN_DIR,outputs}/${now:%Y-%m-%d}_${experiment.name}/${now:%H-%M-%S}
  sweep:
    dir: ${oc.env:HYDRA_SWEEP_DIR,multirun}/${now:%Y-%m-%d}_${experiment.name}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
