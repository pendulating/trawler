# @package _global_
# Phi-4-multimodal-instruct for VLM benchmarks.
# max_num_seqs=1 required: Phi-4's dynamic image tiling produces variable-shape
# image_attention_mask tensors that cannot be batched in vLLM V1.
model:
  model_source: /share/pierson/matt/zoo/models/Phi-4-multimodal-instruct
  model_family: phi-4
  engine_kwargs:
    max_model_len: 8192
    max_num_seqs: 1
    tensor_parallel_size: 1
    trust_remote_code: true
    enforce_eager: true
  batch_size: 0
  concurrency: 1
