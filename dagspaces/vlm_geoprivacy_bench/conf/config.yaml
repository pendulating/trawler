# Top-level Hydra config for VLM-GeoPrivacyBench dagspace

defaults:
  - _self_
  - pipeline: mcq_eval
  - model: qwen2.5-vl-7b
  - prompt: mcq_zs_heuristics
  - data: geoprivacy_bench

experiment:
  name: vlm_geoprivacy_bench

runtime:
  output_root: null
  debug: false
  sample_n: null
  job_memory_gb: 64

sampling_params:
  seed: 1
  temperature: 0.7
  top_p: 0.95
  max_tokens: 512

wandb:
  enabled: true
  project: vlm-geoprivacy-bench
  entity: ""
  group: ""
  table_sample_rows: 1000
  single_run: true

hydra:
  searchpath:
    - pkg://dagspaces.common.conf
  job:
    name: ${experiment.name}
  run:
    dir: ${oc.env:HYDRA_RUN_DIR,outputs}/${now:%Y-%m-%d}_${experiment.name}/${now:%H-%M-%S}
  sweep:
    dir: ${oc.env:HYDRA_SWEEP_DIR,multirun}/${now:%Y-%m-%d}_${experiment.name}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
