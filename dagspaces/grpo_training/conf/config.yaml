defaults:
  - _self_
  - pipeline: full_training
  - model: qwen3-8b/base
  - training/sft: default
  - training/grpo: colocate_1gpu_prod
  - prompt@prompt_reward_judge: reward_judge
  - prompt@prompt_no_flow_judge: no_flow_judge
  - prompt@prompt_norm_judgment: norm_judgment
  - prompt@prompt_ci_extraction: ci_extraction

experiment:
  name: grpo_training

runtime:
  output_root: outputs/grpo_training
  debug: false
  sample_n: null
  book_id: null
  job_memory_gb: 64

# Embedding model for norm universe / online R_ground
embedding_model:
  model_source: ${oc.env:EMBEDDING_MODEL_PATH,/share/pierson/matt/zoo/models/Qwen3-Embedding-8B}

# Judge model for R_ground reward prep
judge_model:
  model_source: ${oc.env:JUDGE_MODEL_PATH,/share/pierson/matt/zoo/models/Qwen3-32B-AWQ}
  engine_kwargs:
    tensor_parallel_size: 1
    quantization: awq
    max_model_len: 16384
    max_num_batched_tokens: 16384
    max_num_seqs: 64
    kv_cache_dtype: fp8
    enforce_eager: false
    enable_chunked_prefill: true
    enable_prefix_caching: true

wandb:
  enabled: true
  project: grpo-ci-training

hydra:
  searchpath:
    - pkg://dagspaces.common.conf
  job:
    name: ${experiment.name}
  run:
    dir: ${oc.env:HYDRA_RUN_DIR,multirun}/${now:%Y-%m-%d}_${experiment.name}/${now:%H-%M-%S}
  sweep:
    dir: ${oc.env:HYDRA_SWEEP_DIR,multirun}/${now:%Y-%m-%d}_${experiment.name}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
