# @package training.grpo
num_generations: 8          # G completions per prompt
learning_rate: 1.0e-6
per_device_batch_size: 2
gradient_accumulation_steps: 8
num_epochs: 1
warmup_ratio: 0.1
max_completion_length: 6144
gradient_checkpointing: true
bf16: true
logging_steps: 5
save_strategy: steps
save_steps: 200

# vLLM generation backend for sampling completions
use_vllm: true
vllm_mode: colocate              # "colocate" (4-GPU) or "server" (8+ GPU)
vllm_gpu_memory_utilization: 0.3 # Low for colocate — shares GPU with training
vllm_enable_sleep_mode: true     # Offload vLLM weights during optimizer step

# Server mode settings (only used when vllm_mode=server)
# vllm_server_host: "0.0.0.0"
# vllm_server_port: 8000
# vllm_server_timeout: 240.0
# vllm_tensor_parallel_size: 1
# vllm_max_model_length: null

# Contrastive normative pairing: fraction of prompts paired with wrong N_hat_b
# Enable model thinking during GRPO generation (strip before reward scoring)
enable_thinking_grpo: true

# Legacy additive contrastive rows (dataset augmentation).
# Set to 0 — contrastive signal now comes from per-completion dual
# scoring in OnlineRGround (see contrastive_lambda below).
contrastive_ratio: 0.0

# Per-completion contrastive penalty weight (λ).
# R_ground = clamp(correct_score - λ * wrong_score, 0, 1).
# Each completion is judged against both the correct normative universe
# and a random wrong one.  λ=0.5 means half-weight penalty for
# alignment with wrong norms.  Set to 0.0 to disable contrastive.
contrastive_lambda: 0.5

# No-flow scoring mode:
#   "independent" — each component scores no-flow completions independently;
#                   R_ground uses coverage judge to evaluate normative context.
#   "flat"        — legacy: all components get the same flat no_flow_reward().
no_flow_scoring: independent

# Reward component weights: [r_uncert, r_complete, r_consist, r_context, r_cohere, r_ground]
reward_weights:
  - 0.10   # r_uncert  (task clarity / schema validity — gating)
  - 0.05   # r_complete (structural completeness — saturated post-SFT)
  - 0.05   # r_consist (internal consistency — saturated post-SFT)
  - 0.20   # r_context (context identification)
  - 0.10   # r_cohere (reasoning-to-extraction coherence)
  - 0.50   # r_ground (normative grounding — LLM-judged)

# ── Mixed-task training: norm judgment vignettes ──
# Ratio of judgment vignettes in the training dataset (0.0 = disabled).
# At 0.2, ~20% of prompts are "should X share info with Y?" vignettes
# derived from the norm universes.  Teaches the model to *apply* norms
# as behavioral constraints, bridging CI extraction → privacy judgment.
vignette_ratio: 0.0

# Reward weights for judgment vignettes: [r_judgment, r_reasoning, r_norm_cite]
judgment_reward_weights:
  - 0.50   # r_judgment (binary correctness vs gold)
  - 0.25   # r_reasoning (keyword-based reasoning quality)
  - 0.25   # r_norm_cite (norm citation overlap with source norm)

# Sentence-transformer model for r_context semantic similarity
context_embedding_model: all-MiniLM-L6-v2

# Online R_ground: evaluate model completions live via embedding + judge servers.
# Requires >= 5 GPUs (1 embed + 2 judge + 2 training). When false, falls back
# to cached lookup from reward_prep.
online_rground: false
embedding_server_port: 8001
judge_server_port: 8002
judge_server_tensor_parallel_size: 2
