# @package training.grpo
num_generations: 8          # G completions per prompt
learning_rate: 1.0e-6
per_device_batch_size: 2
gradient_accumulation_steps: 8
num_epochs: 1
warmup_ratio: 0.1
max_completion_length: 4096
gradient_checkpointing: true
bf16: true
logging_steps: 5
save_strategy: steps
save_steps: 200

# vLLM generation backend for sampling completions
use_vllm: true
vllm_mode: colocate              # "colocate" (4-GPU) or "server" (8+ GPU)
vllm_gpu_memory_utilization: 0.3 # Low for colocate — shares GPU with training
vllm_enable_sleep_mode: true     # Offload vLLM weights during optimizer step

# Server mode settings (only used when vllm_mode=server)
# vllm_server_host: "0.0.0.0"
# vllm_server_port: 8000
# vllm_server_timeout: 240.0
# vllm_tensor_parallel_size: 1
# vllm_max_model_length: null

# Contrastive normative pairing: fraction of prompts paired with wrong N_hat_b
contrastive_ratio: 0.1

# Reward component weights: [r_uncert, r_complete, r_consist, r_context, r_cohere, r_ground]
reward_weights:
  - 0.20   # r_uncert  (task clarity / schema validity — gating)
  - 0.15   # r_complete (structural completeness)
  - 0.15   # r_consist (internal consistency)
  - 0.15   # r_context (context identification)
  - 0.15   # r_cohere (reasoning-to-extraction coherence)
  - 0.20   # r_ground (normative grounding — LLM-judged)

# Sentence-transformer model for r_context semantic similarity
context_embedding_model: all-MiniLM-L6-v2
