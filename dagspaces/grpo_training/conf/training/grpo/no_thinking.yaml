# @package training.grpo
# Ablation: GRPO with thinking DISABLED (matches pre-think-block behaviour).
# Use for §3.2.4 reward component ablations: training/grpo=no_thinking
num_generations: 8          # G completions per prompt
learning_rate: 1.0e-6
per_device_batch_size: 2
gradient_accumulation_steps: 8
num_epochs: 1
warmup_ratio: 0.1
max_completion_length: 4096
gradient_checkpointing: true
bf16: true
logging_steps: 5
save_strategy: steps
save_steps: 200

# vLLM generation backend for sampling completions
use_vllm: true
vllm_mode: colocate              # "colocate" (4-GPU) or "server" (8+ GPU)
vllm_gpu_memory_utilization: 0.3 # Low for colocate — shares GPU with training
vllm_enable_sleep_mode: true     # Offload vLLM weights during optimizer step

# Thinking disabled — model generates structured JSON directly (no <think> blocks)
enable_thinking_grpo: false

contrastive_ratio: 0.0
contrastive_lambda: 0.5

# Reward component weights: [r_uncert, r_complete, r_consist, r_context, r_cohere, r_ground]
reward_weights:
  - 0.10   # r_uncert  (task clarity / schema validity — gating)
  - 0.05   # r_complete (structural completeness — saturated post-SFT)
  - 0.05   # r_consist (internal consistency — saturated post-SFT)
  - 0.20   # r_context (context identification)
  - 0.10   # r_cohere (reasoning-to-extraction coherence)
  - 0.50   # r_ground (normative grounding — LLM-judged)

# Sentence-transformer model for r_context semantic similarity
context_embedding_model: all-MiniLM-L6-v2
