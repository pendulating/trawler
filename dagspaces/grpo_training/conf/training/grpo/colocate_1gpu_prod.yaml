# @package training.grpo
# Production GRPO config: 1 full epoch on 1x A6000 (48GB).
# grad_accum=16 gives effective batch of 32 (closer to standard).
# ~57 optimizer steps over ~228 training steps, ~2.5 hours.
num_generations: 2
learning_rate: 1.0e-6
per_device_batch_size: 1
gradient_accumulation_steps: 16
num_epochs: 1
warmup_steps: 5
max_completion_length: 3072
gradient_checkpointing: true
bf16: true
logging_steps: 10
save_strategy: "steps"
save_steps: 100

use_vllm: true
vllm_mode: colocate
vllm_gpu_memory_utilization: 0.45
vllm_enable_sleep_mode: true

# Thinking disabled: model fills entire max_completion_length with <think> blocks,
# leaving no tokens for JSON output → all rewards = 0 → no training signal.
enable_thinking_grpo: false

contrastive_ratio: 0.0

reward_weights:
  - 0.15   # R_uncert  (gating)
  - 0.10   # R_complete (saturated post-SFT)
  - 0.10   # R_consist  (saturated post-SFT)
  - 0.35   # R_context
  - 0.30   # R_cohere
  - 0.00   # R_ground  (disabled — no judge servers)

context_embedding_model: all-MiniLM-L6-v2
