# @package training.grpo
# Production GRPO config: 1 full epoch on 1x A6000 (48GB).
# grad_accum=16 gives effective batch of 32 (closer to standard).
# ~57 optimizer steps over ~228 training steps, ~2.5 hours.
num_generations: 2
learning_rate: 1.0e-6
per_device_batch_size: 1
gradient_accumulation_steps: 16
num_epochs: 1
warmup_steps: 5
max_completion_length: 3072
gradient_checkpointing: true
bf16: true
logging_steps: 10
save_strategy: "steps"
save_steps: 100

use_vllm: true
vllm_mode: colocate
vllm_gpu_memory_utilization: 0.45
vllm_enable_sleep_mode: true

# Enable model thinking during GRPO generation (strip before reward scoring)
enable_thinking_grpo: true

contrastive_ratio: 0.0

# Full 6-component reward with R_ground enabled
reward_weights:
  - 0.20   # R_uncert
  - 0.15   # R_complete
  - 0.15   # R_consist
  - 0.15   # R_context
  - 0.15   # R_cohere
  - 0.20   # R_ground

context_embedding_model: all-MiniLM-L6-v2
