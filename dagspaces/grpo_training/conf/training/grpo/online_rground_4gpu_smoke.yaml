# @package training.grpo
# Smoke test for online R_ground: 4 GPUs, 10 steps, short completions.

online_rground: true
embedding_server_port: 8001
judge_server_port: 8002
judge_server_tensor_parallel_size: 2

num_generations: 2
learning_rate: 1.0e-6
per_device_batch_size: 1
gradient_accumulation_steps: 2
num_epochs: 1
max_steps: 10
warmup_steps: 2
max_completion_length: 512
gradient_checkpointing: true
bf16: true
logging_steps: 1
save_strategy: "no"

use_vllm: true
vllm_mode: colocate
vllm_gpu_memory_utilization: 0.45
vllm_enable_sleep_mode: true

enable_thinking_grpo: true
contrastive_ratio: 0.0

reward_weights:
  - 0.20
  - 0.15
  - 0.15
  - 0.15
  - 0.15
  - 0.20

context_embedding_model: all-MiniLM-L6-v2
