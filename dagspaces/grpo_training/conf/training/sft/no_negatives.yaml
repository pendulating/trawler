# @package training.sft
# Ablation: SFT without negative examples (no has_information_exchange=False).
# Tests whether teaching the model to recognize "no information exchange" chunks
# improves downstream CI reasoning quality.
# Use: training/sft=no_negatives
num_epochs: 3
learning_rate: 2.0e-5
per_device_batch_size: 2
gradient_accumulation_steps: 8
warmup_ratio: 0.1
weight_decay: 0.01
max_seq_length: 8192
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
max_grad_norm: 1.0
bf16: true
dataloader_num_workers: 4
logging_steps: 10
save_strategy: epoch

lora:
  rank: 64
  alpha: 128
  dropout: 0.05
  target_modules: all-linear
  task_type: CAUSAL_LM

sample_fraction: null

# Ablation: no negative examples
include_negative_examples: false
