# @package _global_
# GRPO-only pipeline with online R_ground (alias for grpo_only).
#
# Usage:
#   SFT_CHECKPOINT_PATH=... NORM_UNIVERSES_PATH=... CI_REASONING_PATH=... \
#   python -m dagspaces.grpo_training.cli \
#     pipeline=grpo_only_online \
#     training/grpo=online_rground_4gpu \
#     model=qwen3-8b

defaults:
  - override /hydra/launcher: slurm_monitor

pipeline:
  output_root: ${hydra:run.dir}/grpo_only_online

  sources:
    sft_checkpoint:
      path: ${oc.env:SFT_CHECKPOINT_PATH}
      type: dir
    norm_universes:
      path: ${oc.env:NORM_UNIVERSES_PATH}
      type: json
    ci_reasoning:
      path: ${oc.env:CI_REASONING_PATH}
      type: parquet

  graph:
    nodes:
      grpo_training:
        stage: grpo_training
        depends_on: []
        inputs:
          sft_checkpoint: sft_checkpoint
          chunks: ci_reasoning
          norm_universes: norm_universes
        outputs:
          checkpoint:
            path: outputs/grpo/checkpoint
            type: dir
        launcher: slurm_gpu_4x
        wandb_suffix: grpo_training
