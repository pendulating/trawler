# @package _global_
# GRPO-only pipeline with online R_ground.
#
# Pass a -sft-ci model config that includes lora_path (the SFT checkpoint):
#
#   NORM_UNIVERSES_PATH=... CI_REASONING_PATH=... \
#   python -m dagspaces.grpo_training.cli \
#     pipeline=grpo_only_online \
#     training/grpo=online_rground_4gpu \
#     model=qwen3.5-9b/sft-ci

defaults:
  - override /hydra/launcher: slurm_monitor

pipeline:
  output_root: ${hydra:run.dir}/grpo_only_online

  sources:
    sft_checkpoint:
      path: ${model.lora_path}
      type: dir
    norm_universes:
      path: ${oc.env:NORM_UNIVERSES_PATH}
      type: json
    ci_reasoning:
      path: ${oc.env:CI_REASONING_PATH}
      type: parquet
    norm_embeddings:
      path: ${oc.env:NORM_EMBEDDINGS_PATH,""}
      type: dir

  graph:
    nodes:
      grpo_training:
        stage: grpo_training
        depends_on: []
        inputs:
          sft_checkpoint: sft_checkpoint
          chunks: ci_reasoning
          norm_universes: norm_universes
          embeddings: norm_embeddings
        outputs:
          checkpoint:
            path: outputs/grpo/checkpoint
            type: dir
        launcher: slurm_train_3x
        wandb_suffix: grpo_training
