# @package _global_
# GRPO-only pipeline with online R_ground.
# Assumes SFT checkpoint, norm universes, and norm embeddings exist.
#
# Usage:
#   SFT_CHECKPOINT_PATH=... NORM_UNIVERSES_PATH=... NORM_EMBEDDINGS_PATH=... \
#   CI_REASONING_PATH=... \
#   python -m dagspaces.grpo_training.cli \
#     pipeline=grpo_only \
#     training/grpo=online_rground_5gpu \
#     model=qwen3-8b

defaults:
  - override /hydra/launcher: slurm_monitor

pipeline:
  output_root: ${hydra:run.dir}/grpo_only

  sources:
    sft_checkpoint:
      path: ${oc.env:SFT_CHECKPOINT_PATH}
      type: dir
    norm_universes:
      path: ${oc.env:NORM_UNIVERSES_PATH}
      type: json
    norm_embeddings:
      path: ${oc.env:NORM_EMBEDDINGS_PATH}
      type: dir
    ci_reasoning:
      path: ${oc.env:CI_REASONING_PATH}
      type: parquet

  graph:
    nodes:
      grpo_training:
        stage: grpo_training
        depends_on: []
        inputs:
          sft_checkpoint: sft_checkpoint
          chunks: ci_reasoning
          norm_universes: norm_universes
          embeddings: norm_embeddings
        outputs:
          checkpoint:
            path: outputs/grpo/checkpoint
            type: dir
        launcher: slurm_gpu_5x
        wandb_suffix: grpo_training
