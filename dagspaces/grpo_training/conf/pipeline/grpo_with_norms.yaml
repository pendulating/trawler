# @package _global_
# GRPO pipeline with norm universe embedding + reward prep.
# Assumes SFT checkpoint and SFT pairs already exist.
#
# Usage:
#   STRUCTURED_NORMS_PATH=... SFT_CHECKPOINT_PATH=... SFT_PAIRS_PATH=... \
#   python -m dagspaces.grpo_training.cli \
#     pipeline=grpo_with_norms \
#     training/grpo=colocate_1gpu_9b \
#     model=qwen3-8b

defaults:
  - override /hydra/launcher: slurm_monitor

pipeline:
  output_root: ${hydra:run.dir}/grpo_with_norms

  sources:
    structured_norms:
      path: ${oc.env:STRUCTURED_NORMS_PATH}
      type: parquet
    sft_checkpoint:
      path: ${oc.env:SFT_CHECKPOINT_PATH}
      type: dir
    sft_pairs:
      path: ${oc.env:SFT_PAIRS_PATH}
      type: parquet

  graph:
    nodes:
      norm_universe:
        stage: norm_universe
        depends_on: []
        inputs:
          dataset: structured_norms
        outputs:
          dataset:
            path: outputs/norm_universe/norm_universes.json
            type: json
          embeddings:
            path: outputs/norm_universe/embeddings
            type: dir
        launcher: slurm_gpu_1x
        wandb_suffix: norm_universe

      reward_prep:
        stage: reward_prep
        depends_on:
          - norm_universe
        inputs:
          dataset: sft_pairs
          norm_universes: norm_universe.dataset
          embeddings: norm_universe.embeddings
        outputs:
          dataset:
            path: outputs/reward_prep/reward_cache.parquet
            type: parquet
        launcher: slurm_train_2x
        wandb_suffix: reward_prep

      grpo_training:
        stage: grpo_training
        depends_on:
          - norm_universe
          - reward_prep
        inputs:
          sft_checkpoint: sft_checkpoint
          dataset: sft_pairs
          reward_cache: reward_prep.dataset
          norm_universes: norm_universe.dataset
        outputs:
          checkpoint:
            path: outputs/grpo/checkpoint
            type: dir
        launcher: slurm_gpu_1x
        wandb_suffix: grpo_training
