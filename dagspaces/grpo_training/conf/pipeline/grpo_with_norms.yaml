# @package _global_
# GRPO pipeline with norm universe embedding + online R_ground.
# Assumes SFT checkpoint exists. Consumes text chunks directly.
# reward_prep runs in parallel as an inspection tool but is NOT a GRPO dependency.
#
# Usage:
#   ABSTRACTED_NORMS_PATH=... CI_REASONING_PATH=... \
#   python -m dagspaces.grpo_training.cli \
#     pipeline=grpo_with_norms \
#     training/grpo=online_rground_5gpu \
#     model=qwen3.5-9b/sft-ci

defaults:
  - override /hydra/launcher: slurm_monitor

pipeline:
  output_root: ${hydra:run.dir}/grpo_with_norms

  sources:
    abstracted_norms:
      path: ${oc.env:ABSTRACTED_NORMS_PATH}
      type: parquet
    sft_checkpoint:
      path: ${model.lora_path}
      type: dir
    ci_reasoning:
      path: ${oc.env:CI_REASONING_PATH}
      type: parquet

  graph:
    nodes:
      norm_universe:
        stage: norm_universe
        depends_on: []
        inputs:
          dataset: abstracted_norms
        outputs:
          dataset:
            path: outputs/norm_universe/norm_universes.json
            type: json
          embeddings:
            path: outputs/norm_universe/embeddings
            type: dir
        launcher: slurm_gpu_1x
        wandb_suffix: norm_universe

      grpo_training:
        stage: grpo_training
        depends_on:
          - norm_universe
        inputs:
          sft_checkpoint: sft_checkpoint
          chunks: ci_reasoning
          norm_universes: norm_universe.dataset
          embeddings: norm_universe.embeddings
        outputs:
          checkpoint:
            path: outputs/grpo/checkpoint
            type: dir
        launcher: slurm_gpu_4x
        wandb_suffix: grpo_training
