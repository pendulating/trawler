# @package _global_
# GRPO with programmatic-only rewards (no R_ground LLM judge).
# Weights: [r_uncert, r_complete, r_consist, r_context, r_cohere, r_ground=0]
#
# Usage:
#   NORM_UNIVERSES_PATH=... \
#   python -m dagspaces.grpo_training.cli \
#     pipeline=grpo_programmatic_only \
#     model=qwen3.5-9b/sft-ci \
#     wandb.enabled=false

defaults:
  - override /hydra/launcher: slurm_monitor

training:
  grpo:
    num_generations: 2
    learning_rate: 1.0e-6
    per_device_batch_size: 1
    gradient_accumulation_steps: 16
    num_epochs: 1
    warmup_ratio: 0.1
    max_completion_length: 3072
    gradient_checkpointing: true
    bf16: true
    logging_steps: 10
    save_strategy: steps
    save_steps: 100
    use_vllm: true
    vllm_mode: colocate
    vllm_gpu_memory_utilization: 0.45
    vllm_enable_sleep_mode: false
    contrastive_ratio: 0.0
    # Zero out R_ground; redistribute weight to programmatic components
    reward_weights:
      - 0.15   # r_uncert  (gating)
      - 0.10   # r_complete (saturated post-SFT)
      - 0.10   # r_consist  (saturated post-SFT)
      - 0.35   # r_context
      - 0.30   # r_cohere
      - 0.00   # r_ground (disabled)
    context_embedding_model: all-MiniLM-L6-v2

pipeline:
  output_root: ${hydra:run.dir}/grpo_programmatic_only

  sources:
    sft_checkpoint:
      path: ${model.lora_path}
      type: dir
    norm_universes:
      path: ${oc.env:NORM_UNIVERSES_PATH}
      type: json
    ci_reasoning:
      path: ${oc.env:CI_REASONING_PATH}
      type: parquet

  graph:
    nodes:
      grpo_training:
        stage: grpo_training
        depends_on: []
        inputs:
          sft_checkpoint: sft_checkpoint
          chunks: ci_reasoning
          norm_universes: norm_universes
        outputs:
          checkpoint:
            path: outputs/grpo/checkpoint
            type: dir
        launcher: slurm_gpu_1x
        wandb_suffix: grpo_programmatic
