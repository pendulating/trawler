# @package _global_
# GRPO with programmatic-only rewards (no R_ground LLM judge).
# Weights: [r_uncert, r_complete, r_consist, r_context, r_cohere, r_ground=0]
#
# Usage:
#   SFT_CHECKPOINT_PATH=... NORM_UNIVERSES_PATH=... SFT_PAIRS_PATH=... \
#   python -m dagspaces.grpo_training.cli \
#     pipeline=grpo_programmatic_only \
#     wandb.enabled=false

defaults:
  - override /hydra/launcher: slurm_monitor

training:
  grpo:
    num_generations: 8
    learning_rate: 1.0e-6
    per_device_batch_size: 1
    gradient_accumulation_steps: 4
    num_epochs: 1
    warmup_steps: 10
    max_completion_length: 2048
    gradient_checkpointing: true
    bf16: true
    logging_steps: 5
    save_strategy: steps
    save_steps: 100
    use_vllm: true
    vllm_mode: colocate
    vllm_gpu_memory_utilization: 0.3
    vllm_enable_sleep_mode: true
    contrastive_ratio: 0.0
    # Zero out R_ground; redistribute weight to programmatic components
    reward_weights:
      - 0.25   # r_uncert
      - 0.20   # r_complete
      - 0.20   # r_consist
      - 0.20   # r_context
      - 0.15   # r_cohere
      - 0.00   # r_ground (disabled)
    context_embedding_model: all-MiniLM-L6-v2

pipeline:
  output_root: ${hydra:run.dir}/grpo_programmatic_only

  sources:
    sft_checkpoint:
      path: ${oc.env:SFT_CHECKPOINT_PATH}
      type: dir
    norm_universes:
      path: ${oc.env:NORM_UNIVERSES_PATH}
      type: json
    ci_reasoning:
      path: ${oc.env:CI_REASONING_PATH}
      type: parquet

  graph:
    nodes:
      grpo_training:
        stage: grpo_training
        depends_on: []
        inputs:
          sft_checkpoint: sft_checkpoint
          chunks: ci_reasoning
          norm_universes: norm_universes
        outputs:
          checkpoint:
            path: outputs/grpo/checkpoint
            type: dir
        launcher: slurm_gpu_1x
        wandb_suffix: grpo_programmatic
