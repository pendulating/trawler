# @package _global_
# Norm universe embedding + reward prep only (no GRPO training).
# Use to rebuild norm universes and reward cache after upstream norm changes,
# then inspect before triggering GRPO.
#
# Usage:
#   ABSTRACTED_NORMS_PATH=... SFT_PAIRS_PATH=... \
#   python -m dagspaces.grpo_training.cli \
#     pipeline=norm_universe_and_reward_prep \
#     model=qwen3-8b

defaults:
  - override /hydra/launcher: slurm_monitor

pipeline:
  output_root: ${hydra:run.dir}/norm_universe_and_reward_prep

  sources:
    abstracted_norms:
      path: ${oc.env:ABSTRACTED_NORMS_PATH}
      type: parquet
    sft_pairs:
      path: ${oc.env:SFT_PAIRS_PATH}
      type: parquet

  graph:
    nodes:
      norm_universe:
        stage: norm_universe
        depends_on: []
        inputs:
          dataset: abstracted_norms
        outputs:
          dataset:
            path: outputs/norm_universe/norm_universes.json
            type: json
          embeddings:
            path: outputs/norm_universe/embeddings
            type: dir
        launcher: slurm_gpu_1x
        wandb_suffix: norm_universe

      reward_prep:
        stage: reward_prep
        depends_on:
          - norm_universe
        inputs:
          dataset: sft_pairs
          norm_universes: norm_universe.dataset
          embeddings: norm_universe.embeddings
        outputs:
          dataset:
            path: outputs/reward_prep/reward_cache.parquet
            type: parquet
        overrides:
          judge_model.engine_kwargs.data_parallel_size: 2
        launcher: slurm_gpu_4x
        wandb_suffix: reward_prep
