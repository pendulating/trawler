# CPU-only Submitit Slurm launcher for data-prep stages (no GPUs)
_target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.SlurmLauncher
submitit_folder: ${hydra.sweep.dir}/.submitit/%j
timeout_min: 2880
nodes: 1
tasks_per_node: 1
cpus_per_task: 2
mem_gb: 16
partition: pierson
array_parallelism: 1
name: ${experiment.name}
additional_parameters:
  gres: "none"
  wckey: ""
srun_args:
  - --gres=none
  - --cpu-bind=none
setup:
  - export HYDRA_FULL_ERROR=1
  - source ~/.bashrc
  - source /share/pierson/matt/UAIR/.venv/bin/activate
  - unset WANDB_DISABLED
  - if [ -n "$WANDB_MODE" ]; then export WANDB_MODE="$WANDB_MODE"; fi
  - if [ -n "$WANDB_BASE_URL" ]; then export WANDB_BASE_URL="$WANDB_BASE_URL"; fi
  - if [ -n "$WANDB_GROUP" ]; then export WANDB_GROUP="$WANDB_GROUP"; fi
  - export WANDB_SILENT=true
  - export WANDB_DISABLE_SERVICE=true
  - export TOKENIZERS_PARALLELISM=false
  - export SLURM_CPU_BIND=none
  - export OMP_NUM_THREADS=${oc.env:SLURM_CPUS_PER_TASK,2}
  - export MKL_NUM_THREADS=${oc.env:SLURM_CPUS_PER_TASK,2}
  - export OPENBLAS_NUM_THREADS=${oc.env:SLURM_CPUS_PER_TASK,2}
  - export NUMEXPR_MAX_THREADS=${oc.env:SLURM_CPUS_PER_TASK,2}
  - export VECLIB_MAXIMUM_THREADS=${oc.env:SLURM_CPUS_PER_TASK,2}
  - export BLIS_NUM_THREADS=${oc.env:SLURM_CPUS_PER_TASK,2}
  - if [ -n "$SLURM_GPUS_ON_NODE" ] && [ "$SLURM_GPUS_ON_NODE" -gt 0 ]; then export CUDA_VISIBLE_DEVICES=$(seq -s, 0 $((SLURM_GPUS_ON_NODE - 1))); else unset CUDA_VISIBLE_DEVICES; fi
  - unset PYTORCH_CUDA_ALLOC_CONF
  - unset CUDA_LAUNCH_BLOCKING
