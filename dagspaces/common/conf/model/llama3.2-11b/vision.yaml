# @package _global_
model:
  model_source: /share/pierson/matt/zoo/models/Llama-3.2-11B-Vision
  # vLLM 0.18 dropped native Mllama support (removed after v0.10.2).
  # All inference (text-only and VLM) uses native transformers fallback,
  # triggered by model_family=llama-vision in vllm_inference.py and
  # vlm_geoprivacy_bench/vlm_inference.py.
  model_family: llama-vision
  engine_kwargs:
    max_model_len: 8192
    max_num_seqs: 16
