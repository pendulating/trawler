# Lightweight Submitit Slurm launcher for the Trawler orchestrator parent (monitor)
_target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.SlurmLauncher
submitit_folder: ${hydra.sweep.dir}/.submitit/%j
timeout_min: 4320
nodes: 1
tasks_per_node: 1
cpus_per_task: 1
mem_gb: 8
partition: ${oc.env:SLURM_PARTITION,pierson}
array_parallelism: 1
name: ${experiment.name}-monitor
additional_parameters:
  gres: "none"
srun_args:
  - --gres=none
  - --cpu-bind=none
setup:
  - export HYDRA_FULL_ERROR=1
  - source ~/.bashrc
  - source ${oc.env:TRAWLER_VENV_ACTIVATE,/share/pierson/matt/UAIR/.venv/bin/activate}
  - unset WANDB_DISABLED
  - if [ -n "$WANDB_MODE" ]; then export WANDB_MODE="$WANDB_MODE"; fi
  - if [ -n "$WANDB_BASE_URL" ]; then export WANDB_BASE_URL="$WANDB_BASE_URL"; fi
  - if [ -n "$WANDB_GROUP" ]; then export WANDB_GROUP="$WANDB_GROUP"; fi
  - export WANDB_SILENT=true
  # Disable wandb service for distributed environments (uses in-process mode)
  - export WANDB_DISABLE_SERVICE=true
  - export TOKENIZERS_PARALLELISM=false
  - export PYTHONUNBUFFERED=1
  - export PYTHONPATH=${oc.env:TRAWLER_PROJECT_ROOT,/share/pierson/matt/UAIR}:$PYTHONPATH
