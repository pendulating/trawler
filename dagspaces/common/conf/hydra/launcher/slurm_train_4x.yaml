# 4-GPU SLURM launcher for TRL training stages (SFT/GRPO).
# Based on slurm_gpu_4x_16cpu but with training-specific settings.
_target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.SlurmLauncher
submitit_folder: ${hydra.sweep.dir}/.submitit/%j
timeout_min: 4320
nodes: 1
tasks_per_node: 1
cpus_per_task: 8
mem_gb: ${runtime.job_memory_gb}
partition: ${oc.env:SLURM_PARTITION,pierson}
array_parallelism: 1
gpus_per_node: 4
name: ${experiment.name}
additional_parameters:
  gres: gpu:4
setup:
  - export HYDRA_FULL_ERROR=1
  - source ~/.bashrc
  - source ${oc.env:TRAWLER_VENV_ACTIVATE,/share/pierson/matt/UAIR/.venv/bin/activate}
  - if [ -n "$SLURM_GPUS_ON_NODE" ] && [ "$SLURM_GPUS_ON_NODE" -gt 0 ]; then export CUDA_VISIBLE_DEVICES=$(seq -s, 0 $((SLURM_GPUS_ON_NODE - 1))); else unset CUDA_VISIBLE_DEVICES; fi
  - export PYTHONUNBUFFERED=1
  - export PYTHONPATH=${oc.env:TRAWLER_PROJECT_ROOT,/share/pierson/matt/UAIR}:$PYTHONPATH
  - echo "=== GPU sanity (pre-job) ==="
  - echo "HOST=$(hostname) DATE=$(date)"
  - echo "CUDA_VISIBLE_DEVICES=$CUDA_VISIBLE_DEVICES SLURM_JOB_GPUS=$SLURM_JOB_GPUS SLURM_GPUS_ON_NODE=$SLURM_GPUS_ON_NODE"
  - nvidia-smi -L || true
  - python -c 'import torch; print("torch.cuda.is_available=", torch.cuda.is_available()); print("torch.cuda.device_count=", torch.cuda.device_count())' || true
  - unset WANDB_DISABLED
  - if [ -n "$WANDB_MODE" ]; then export WANDB_MODE="$WANDB_MODE"; fi
  - if [ -n "$WANDB_BASE_URL" ]; then export WANDB_BASE_URL="$WANDB_BASE_URL"; fi
  - if [ -n "$WANDB_GROUP" ]; then export WANDB_GROUP="$WANDB_GROUP"; fi
  - export WANDB_SILENT=true
  - export WANDB_DISABLE_SERVICE=true
  # NCCL for PCIe-only machines (RTX A6000)
  - export NCCL_DEBUG=WARN
  - export NCCL_P2P_DISABLE=1
  - export NCCL_IB_DISABLE=1
  - export NCCL_CUMEM_HOST_ENABLE=0
  - export NCCL_SHM_DISABLE=1
  - export PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512
  - export VLLM_ENFORCE_EAGER=1
  - export CUDA_LAUNCH_BLOCKING=0
  - export TOKENIZERS_PARALLELISM=false
  - if [ -d /scratch ]; then export TMPDIR=/scratch/$USER; else export TMPDIR=/tmp/$USER; fi
  - mkdir -p $TMPDIR
  - export SLURM_CPU_BIND=none
